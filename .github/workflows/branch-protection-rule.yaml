name: Apply Branch Protection Rules

on:
  workflow_dispatch:
    inputs:

      # ── Mode ────────────────────────────────────────────────
      mode:
        description: >
          Choose mode:
          'single' = apply to one repo (fill target_repo + branch_pattern below),
          'bulk'   = apply to all repos in branching-rule/branch-protection.txt
        required: true
        type: choice
        options:
          - single
          - bulk
        default: single

      # ── Single repo inputs (used when mode = single) ────────
      target_repo:
        description: "[single mode] Repo to protect e.g. mosip/admin-services"
        required: false
        type: string
        default: ""

      branch_pattern:
        description: "[single mode] Branch to protect e.g. release-1.2.x"
        required: false
        type: string
        default: ""

      # ── Rules choice (both modes) ───────────────────────────
      rules:
        description: "Choose which branch protection rules to apply"
        required: true
        type: choice
        options:
          - default
          - custom
        default: default

jobs:
  # ── SINGLE REPO MODE ──────────────────────────────────────
  single-repo:
    name: "Single → ${{ inputs.target_repo }} @ ${{ inputs.branch_pattern }}"
    if: inputs.mode == 'single' && inputs.target_repo != '' && inputs.branch_pattern != ''
    uses: Prafulrakhade/kattu/.github/workflows/branch-protection-rule.yaml@master-MOSIP-30370-branching-rule
    with:
      target_repo:      ${{ inputs.target_repo }}
      branch_pattern:   ${{ inputs.branch_pattern }}
      use_custom_rules: ${{ inputs.rules == 'custom' }}
    secrets:
      ACTION_PAT:   ${{ secrets.ACTION_PAT }}
      ALLOWED_TEAM: ${{ secrets.ALLOWED_TEAM }}

  # ── BULK MODE: parse branch-protection.txt ─────────────────
  prepare-matrix:
    name: "📋 Parse branch-protection.txt"
    if: inputs.mode == 'bulk'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse branch-protection.txt
        id: parse
        run: |
          python3 - << 'PYEOF'
          import json, yaml, sys

          try:
            with open("branching-rule/branch-protection.txt") as f:
              config = yaml.safe_load(f)
          except FileNotFoundError:
            print("::error::branching-rule/branch-protection.txt not found!")
            sys.exit(1)

          entries = []
          for item in config.get("repositories", []):
            repo   = (item.get("repo")   or "").strip()
            branch = (item.get("branch") or "").strip()
            if not repo or not branch:
              continue
            entries.append({
              "target_repo":    repo,
              "branch_pattern": branch
            })

          if not entries:
            print("::error::No valid entries found in branch-protection.txt!")
            sys.exit(1)

          print(f"Found {len(entries)} repo(s) to protect:")
          for e in entries:
            print(f"  {e['target_repo']}  →  {e['branch_pattern']}")

          with open("/tmp/matrix.json", "w") as f:
            f.write(json.dumps({"include": entries}))
          PYEOF

          echo "matrix=$(cat /tmp/matrix.json)" >> $GITHUB_OUTPUT

  # ── BULK MODE: apply per repo ──────────────────────────────
  bulk-apply:
    name: "Bulk → ${{ matrix.target_repo }} @ ${{ matrix.branch_pattern }}"
    needs: prepare-matrix
    # No extra if condition needed — prepare-matrix already gates on bulk mode
    # and only runs when mode == 'bulk', so this always runs after it succeeds
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix) }}
    uses: Prafulrakhade/kattu/.github/workflows/branch-protection-rule.yaml@master-MOSIP-30370-branching-rule
    with:
      target_repo:      ${{ matrix.target_repo }}
      branch_pattern:   ${{ matrix.branch_pattern }}
      use_custom_rules: ${{ inputs.rules == 'custom' }}
    secrets:
      ACTION_PAT:   ${{ secrets.ACTION_PAT }}
      ALLOWED_TEAM: ${{ secrets.ALLOWED_TEAM }}