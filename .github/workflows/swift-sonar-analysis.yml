name: Swift Sonar Analysis
on:
  workflow_call:
    inputs:
      SERVICE_LOCATION:
        description: 'Swift package location'
        required: true
        type: string
      SONAR_URL:
        required: false
        type: string
        default: 'https://sonarcloud.io'
    secrets:
      SONAR_TOKEN:
        required: true
      ORG_KEY:
        required: true
      SLACK_WEBHOOK_URL:
        required: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_URL: ${{ inputs.SONAR_URL }}

jobs:
  swift-sonar-analysis:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Setup Sonar Scanner
        run: brew install sonar-scanner
      
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Check if Environmental variables set for sonar
        run: |
          if [[ -z $SONAR_TOKEN ]]; then
            echo "\$SONAR_TOKEN environmental variable not set; EXITING;";
            exit 1;
          fi
          if [[ -z ${{ secrets.ORG_KEY }} ]]; then 
            echo "\$ORG_KEY secret not set; EXITING;";
            exit 1;
          fi
          if [[ -z $SONAR_URL ]]; then
            echo "\$SONAR_URL environmental variable not set; EXITING;";
            exit 1;
          fi
      
      - name: Generate Code Coverage
        run: |
          cd ${{ inputs.SERVICE_LOCATION }}
          swift test --enable-code-coverage
          xcrun llvm-profdata merge -sparse .build/debug/codecov/default.profdata -o .build/debug/codecov/profdata.profdata
          xcrun llvm-cov export -instr-profile=.build/debug/codecov/profdata.profdata -format="lcov" .build/debug/*PackageTests.xctest/Contents/MacOS/*PackageTests > coverage.xml

      - name: Run Sonar Analysis
        run: |
          cd ${{ inputs.SERVICE_LOCATION }}
          sonar-scanner \
            -Dsonar.projectKey=${{ secrets.ORG_KEY }}_${{ github.event.repository.name }} \
            -Dsonar.projectName=${{ github.event.repository.name }} \
            -Dsonar.organization=${{ secrets.ORG_KEY }} \
            -Dsonar.sources=Sources \
            -Dsonar.language=swift \
            -Dsonar.swift.file.suffixes=.swift \
            -Dsonar.host.url=${{ inputs.SONAR_URL }} \
            -Dsonar.swift.coverage.reportPaths=coverage.xml \
            -Dsonar.sourceEncoding=UTF-8
      
      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,author,commit,workflow,job
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: "${{ github.event_name != 'pull_request' && failure() }}"
